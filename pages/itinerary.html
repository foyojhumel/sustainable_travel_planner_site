<!DOCTYPE html>

<html class="light" lang="en">
    <head>
        <meta charset="utf-8"/>
        <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
        <title>Curated Wanderer | Trip Itinerary</title>
        <link href="../styles/output.css" rel="stylesheet"/>   
    </head>
    <body class="bg-surface font-body text-on-surface overflow-x-hidden">
        <nav class="fixed top-0 w-full z-50 bg-surface/70 dark:bg-on-surface/70 backdrop-blur-md">
            <div class="flex justify-between items-center px-4 py-4 max-w-screen-2xl mx-auto">
                <div class="font-headline text-xl font-bold tracking-tight text-primary dark:text-[#dbe1ff]">
                    <a href="../index.html">
                        Curated Wanderer
                    </a>
                </div>
                <div class="hidden md:flex gap-8">
                    <a class="font-headline tracking-widest uppercase text-[#44474e] dark:text-[#c4c6d0] hover:text-primary transition-colors duration-300" href="../pages/result.html">
                        Destinations
                    </a>
                    <div class="font-headline uppercase tracking-widest text-primary dark:text-[#dbe1ff] border-b-2 border-primary pb-1">
                        Itinerary
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <svg id="favIcon" viewBox="0 0 24 24" fill="#434653" class="w-6 h-6 cursor-pointer transition-transform scale-95 active:opacity-80 dark:fill-[#dbe1ff]">
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41 0.81 4.5 2.09 C13.09 3.81 14.76 3 16.5 3
                                19.58 3 22 5.42 22 8.5 c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                    </svg>
                    <div>
                        <img class="w-10 h-10 rounded-full overflow-hidden" src="../images/profile/foyoJhumel1.jpg"/>
                    </div>
                </div>
            </div>
        </nav>
        <!--Main Content Shell-->
        <main class="pt-20 h-screen flex flex-col md:flex-row overflow-hidden">
            <!--Left: Timeline/Itinerary Panel-->
            <aside class="w-full md:w-[550px] lg:w-[650px] bg-surface-container-low px-6 md:px-10 py-8 overflow-y-auto h-full">
                <div class="mb-10">
                    <span class="font-headline uppercase tracking-widest text-[11px] text-secondary font-bold mb-2 block">
                        Suggested Expedition
                    </span>
                    <h1 class="font-headline text-4xl font-extrabold text-primary leading-tight tracking-tight mb-4">
                        <span id="locationName" class="font-headline text-4xl font-extrabold text-primary leading_tight tracking-tight"></span>
                        <span>Odyssey</span>
                    </h1>
                    <p class="text-on-surface-variant leading-relaxed max-w-sm">
                        <span>A 1-day curated journey through</span>
                        <span id="locationDesc" class="text-on-surface-variant leading-relaxed max-w-sm"></span>
                    </p>
                </div>
                <!--Timeline-->
                <div class="relative">
                    <!--Vertical Line-->
                    <div class="absolute left-4 top-2 bottom-0 w-[1px] bg-outline-variant/70"></div>
                    <div id="itineraryCards" class="relative space-y-12"></div>
                        <!--Itinerary Cards to be populated by Javascript-->
                </div>
            </aside>
            <!--Right: Map Panel-->
            <section class="flex-1 relative bg-surface-container">
                <!--Map Visualization-->
                <div id="map" class="absolute inset-0 z-0 bg-surface-container-highest">
                    <div class="w-full h-96 object-cover opacity-60 mix-blend-multiply">
                    </div>
                    <div class="absolute inset-0 map-gradient-overlay hidden md:block">
                    </div>
                </div>
                <div class="absolute top-10 right-10 z-30 hidden lg:block">
                    <div class="bg-surface/90 backdrop-blur-md p-6 rounded-2xl editorial-shadow max-w-xl">
                        <h4 class="font-headline font-bold text-primary text-xl mb-2">
                            Expedition Stats
                        </h4>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <span class="text-[10px] uppercase tracking-wider text-on-surface-variant font-bold">
                                Total Distance
                            </span>
                            <p id="totalDistance" class="text-lg font-headline font-extrabold text-secondary"></p>
                        </div>
                        <div>
                            <span class="text-[10px] uppercase tracking-wider text-on-surface-variant font-bold">
                                Estimated Travel Time
                            </span>
                            <p id="totalDuration" class="text-lg font-headline font-extrabold text-secondary"></p>
                        </div>
                    </div>
                    </div>
                    </div>
                </div>
            </section>
        </main>
        <footer class="w-full mt-20 bg-[#e3e3de] dark:bg-stone-900">
            <div class="flex flex-col md:flex-row justify-between items-center px-12 py-5 gap-8 max-w-screen-2xl mx-auto">
                <div class="flex flex-col gap-4">
                    <div class="hidden lg:flex font-footer font-bold text-stone-900 dark:text-stone-100 text-2xl tracking-tighter">
                        Curated Wanderer
                    </div>
                    <p class="font-footer text-sm tracking-widest text-stone-500 max-w-xs">
                        © 2026 Curated Wanderer. Online Travel Planner.
                    </p>
                </div>
                <div class="flex gap-12">
                    <div class="flex flex-col gap-2">
                        <span class="font-footer text-sm uppercase tracking-widest text-[#00327d] font-bold mb-2">
                            UPOU - CMSC207
                        </span>
                        <a class="font-footer text-sm tracking-widest text-stone-500 hover:text-stone-900 dark:hover:text-stone-100 transition-all duration-200 underline-offset-4 hover:underline" href="#">
                            About Me
                        </a>
                        <a class="font-footer text-sm tracking-widest text-stone-500 hover:text-stone-900 dark:hover:text-stone-100 transition-all duration-200 underline-offset-4 hover:underline" href="#">
                            Terms
                        </a>
                    </div>
                    <div class="flex flex-col gap-2">
                        <span class="font-footer text-sm uppercase tracking-widest text-[#00327d] font-bold mb-2">
                            Support
                        </span>
                        <a class="font-footer text-sm tracking-widest text-stone-500 hover:text-stone-900 dark:hover:text-stone-100 transition-all duration-200 underline-offset-4 hover:underline" href="#">
                            Privacy
                        </a>
                        <a class="font-footer text-sm tracking-widest text-stone-500 hover:text-stone-900 dark:hover:text-stone-100 transition-all duration-200 underline-offset-4 hover:underline" href="#">
                            Support
                        </a>
                    </div>
                </div>
            </div>
        </footer>
        <script src="../scripts/common.js"></script>
        <script src="../scripts/itinerary.js"></script>
        <!-- Load the Google Maps API with async and defer, and include all necessary libraries -->
        <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=routes,geocoding,marker&callback=initMap" loading="async" async defer></script>
    </body>
</html>
